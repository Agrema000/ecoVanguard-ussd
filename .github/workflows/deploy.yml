name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Registry Login and Push
        run: |
          echo "=== Logging into AT Registry ==="
          echo "v6A7ZzV9MFpJDKFKxIxSOptyQFW7pYH0" | docker login registry.africastalking.dev --username dev-z2e9ypw+z1tgsx1 --password-stdin
          
          echo "=== Building Docker Image ==="
          docker build -t registry.africastalking.dev/z2e9ypw/ecoguard:latest .
          
          echo "=== Pushing Docker Image ==="
          docker push registry.africastalking.dev/z2e9ypw/ecoguard:latest